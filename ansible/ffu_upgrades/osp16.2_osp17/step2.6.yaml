---
- name: Preparing container images
  hosts: undercloud
  tasks:
    - name: Create a file called skip_rhel_release.yaml and set the SkipRhelEnforcement parameter to true
      ansible.builtin.copy:
        dest: /home/stack/skip_rhel_release.yaml
        content: |
          parameter_defaults:
            SkipRhelEnforcement: true
        mode: '0644'
        owner: stack
        group: stack

    - name: Remove existing custom_env_files entries in undercloud.conf
      ansible.builtin.lineinfile:
        path: /home/stack/undercloud.conf
        regexp: '^custom_env_files\s*='
        state: absent

    - name: Remove existing container_images_file entries in undercloud.conf
      ansible.builtin.lineinfile:
        path: /home/stack/undercloud.conf
        regexp: '^container_images_file\s*='
        state: absent

    - name: Open the undercloud.conf file and add the container_images_file parameter to the DEFAULT section in the file
      ansible.builtin.lineinfile:
        path: /home/stack/undercloud.conf
        line: >
          container_images_file = /home/stack/containers-prepare-parameter.yaml
        insertafter: '^# configurations. \(string value\)$'
        state: present

    - name: Add the custom_env_files parameter to the DEFAULT section in the undercloud.conf file
      ansible.builtin.lineinfile:
        path: /home/stack/undercloud.conf
        line: 'custom_env_files = /home/stack/skip_rhel_release.yaml'
        insertafter: '^# configurations. \(string value\)$'
        state: present

